---
name: CI

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all bash scripts
        run: |
          shellcheck --shell=bash --severity=warning \
            Automation/install.sh \
            Automation/seer-zeek.sh \
            Automation/bin/seer-capture.sh \
            Automation/bin/seer-verify-install.sh \
            Automation/bin/seer-wait-link.sh \
            Automation/bin/seer_terminal.sh \
            Automation/bin/seer_uninstall.sh

  ruff:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yaml .

  py-compile:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile all Python files
        run: |
          find . -name '*.py' -not -path './.git/*' \
            -exec python -m py_compile {} +

  deps-check:
    name: Python dependency validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and verify dependencies
        run: |
          REQ_FILE="Automation/SEER/scout_receiver/requirements.txt"
          if [ -f "$REQ_FILE" ]; then
            echo "::group::Installing dependencies from $REQ_FILE"
            pip install -r "$REQ_FILE"
            echo "::endgroup::"

            echo "::group::Verifying imports"
            python -c "
          import aiohttp
          import aiohttp_cors
          import yaml
          import jsonschema
          print('All scout_receiver dependencies imported successfully.')
          "
            echo "::endgroup::"
          else
            echo "::notice::$REQ_FILE not found on this branch -- skipping dependency check."
          fi

  file-check:
    name: Blocked file extensions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for forbidden file extensions
        run: |
          BLOCKED="env pem key p12 pfx credentials secret exe dll so o pyc bin iso img jar war"
          PATTERN=""
          for ext in $BLOCKED; do
            [ -n "$PATTERN" ] && PATTERN="$PATTERN|"
            PATTERN="$PATTERN\\.${ext}$"
          done

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACR \
              origin/${{ github.base_ref }}...HEAD || true)
          else
            FILES=$(git diff --name-only --diff-filter=ACR HEAD~1 HEAD || true)
          fi

          if [ -z "$FILES" ]; then
            echo "No new/changed files to check."
            exit 0
          fi

          VIOLATIONS=$(echo "$FILES" | grep -iE "($PATTERN)" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Forbidden file extensions detected:"
            echo "$VIOLATIONS" | while read -r f; do
              echo "::error file=$f::Blocked extension: $f"
            done
            exit 1
          fi
          echo "No forbidden file extensions found."
